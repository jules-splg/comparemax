name: Mise à jour des prix (3x/jour)

on:
  # 08h00, 14h00, 20h00 heure de Paris (CEST UTC+2)
  # → 06h00, 12h00, 18h00 UTC
  schedule:
    - cron: '0 6,12,18 * * *'

  # Déclenchement manuel depuis l'onglet Actions de GitHub
  workflow_dispatch:

jobs:
  update-prices:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # pour pouvoir commiter prices.json

    steps:
      # 1. Récupérer le code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Configurer Node.js 20
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # 3. Installer les dépendances (axios, cheerio)
      - name: Install dependencies
        run: npm ci

      # 4. Lancer le script de mise à jour des prix
      - name: Update prices
        env:
          # Credentials Amazon PA-API 5.0
          # → À configurer dans GitHub → Settings → Secrets and variables → Actions
          AMAZON_ACCESS_KEY: ${{ secrets.AMAZON_ACCESS_KEY }}
          AMAZON_SECRET_KEY: ${{ secrets.AMAZON_SECRET_KEY }}
          AMAZON_PARTNER_TAG: ${{ secrets.AMAZON_PARTNER_TAG }}
        run: npm run update-prices

      # 5. Commiter prices.json si des prix ont changé
      - name: Commit updated prices
        run: |
          git config user.name  "CompareMax Bot"
          git config user.email "bot@comparemax.fr"
          git add data/prices.json
          if git diff --cached --quiet; then
            echo "Aucun changement de prix détecté."
          else
            TIMESTAMP=$(date -u '+%Y-%m-%d %H:%M UTC')
            git commit -m "prix: mise à jour automatique — $TIMESTAMP"
            git push
          fi
